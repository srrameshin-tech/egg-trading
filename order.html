<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Order Form | ஆர்டர் படிவம்</title>
<meta name="theme-color" content="#FFC800">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+Tamil:wght@500;700;800&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{--yellow:#FFC800;--yellow-dark:#E6B400;--black:#111111;--red:#E63946;--green:#2BB673;--white:#fff;--gray:#F4F4F4;--gray-dark:#7A7A7A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Noto Sans Tamil',sans-serif;background:var(--gray);min-height:100vh;}
.ta{font-family:'Noto Sans Tamil','Baloo 2',sans-serif;}
header{background:var(--black);padding:26px 20px 40px;position:relative;overflow:hidden;}
header::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:var(--yellow);transform:rotate(45deg);clip-path:polygon(50% 0%,100% 0%,100% 100%);}
header h1{color:var(--yellow);font-family:'Baloo 2',sans-serif;font-size:24px;position:relative;z-index:2;}
header p{color:#bbb;font-size:12px;margin-top:4px;position:relative;z-index:2;}
.card{background:var(--white);margin:-24px 16px 16px;border-radius:18px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.12);position:relative;z-index:3;}
.field{margin-bottom:14px;}
.field label{font-size:13px;font-weight:800;color:var(--black);display:block;margin-bottom:5px;}
.field input,.field textarea{width:100%;padding:12px;border-radius:10px;border:1.5px solid #ddd;font-size:14px;background:var(--gray);}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--yellow-dark);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{width:100%;background:var(--black);color:var(--yellow);border:none;padding:15px;border-radius:12px;font-weight:800;font-size:16px;margin-top:6px;}
.lang-toggle{position:absolute;top:16px;right:16px;background:var(--yellow);color:var(--black);border:none;padding:6px 12px;border-radius:20px;font-weight:800;font-size:11px;z-index:5;}
.success{display:none;text-align:center;padding:30px 10px;}
.success .ico{font-size:56px;}
.success h2{margin:10px 0 6px;color:var(--green);}
.success p{color:var(--gray-dark);font-size:13px;}
.wa-btn{background:var(--green);color:#fff;margin-top:14px;}
</style>
</head>
<body>
<header>
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">English</button>
  <h1 id="hTitle">🥚 ஆர்டர் படிவம்</h1>
  <p id="hSub">Egg Order Form</p>
</header>

<div class="card" id="formCard">
  <div class="field"><label id="l1">Name</label><input id="f_name"></div>
  <div class="two-col">
    <div class="field"><label id="l2">Contact Number</label><input id="f_contact" type="tel" maxlength="10"></div>
    <div class="field"><label id="l3">WhatsApp Number</label><input id="f_whatsapp" type="tel" maxlength="10"></div>
  </div>
  <div class="field"><label id="l8">Delivery Address</label><textarea id="f_address" rows="2"></textarea></div>
  <div class="two-col">
    <div class="field"><label id="l4">Quantity</label><input id="f_qty" type="number" oninput="recalcPrice()"><small id="minQtyHint" style="color:var(--gray-dark);font-size:11px;"></small></div>
    <div class="field"><label id="l5">Date</label><input id="f_date" type="date"></div>
  </div>
  <div class="field"><label id="l6">Price (₹)</label><input id="f_price" type="number" step="0.01" readonly style="background:#eee;font-weight:800;">
    <div id="customRateNote" style="display:none;color:var(--green);font-size:11px;margin-top:4px;font-weight:700;"></div>
  </div>
  <div class="field"><label id="l7">Note</label><textarea id="f_note" rows="2"></textarea></div>
  <div class="field" style="display:flex;align-items:center;gap:8px;">
    <input type="checkbox" id="f_savedetails" style="width:18px;height:18px;">
    <label for="f_savedetails" id="l9" style="margin:0;">Save my details for next time</label>
  </div>
  <button class="btn" onclick="submitOrder()" id="submitBtn">Submit</button>
</div>

<div class="card success" id="successCard">
  <div class="ico">✅</div>
  <h2 id="sTitle">Order Submitted!</h2>
  <p id="sSub">We'll contact you shortly. Thank you!</p>

  <div id="payBox" style="margin-top:18px;padding-top:18px;border-top:1px dashed #ddd;display:none;">
    <p style="font-weight:800;color:var(--black);margin-bottom:10px;"><span id="payLabelPrefix">Pay ₹</span><span id="payAmount">0</span><span id="payLabelSuffix"> via UPI</span></p>
    <img id="payQR" src="" alt="UPI QR" style="width:180px;height:180px;border-radius:12px;border:1px solid #eee;">
    <a id="payNowBtn" href="#" class="btn" style="display:block;text-decoration:none;margin-top:14px;background:var(--yellow);color:var(--black);">📱 Pay Now</a>
  </div>

  <button class="btn wa-btn" onclick="shareWA()" id="waShareBtn">💬 Share on WhatsApp</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDO190yq5j5dhqwB_UzKfinVcOvacD7NcI",
  authDomain: "egg-trading-2dd61.firebaseapp.com",
  databaseURL: "https://egg-trading-2dd61-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "egg-trading-2dd61",
  storageBucket: "egg-trading-2dd61.firebasestorage.app",
  messagingSenderId: "775524815261",
  appId: "1:775524815261:web:dc2cea55b5069259571f74"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const EMAILJS_PUBLIC_KEY = "KYbHz5WdwR7SMcCT1";
const EMAILJS_SERVICE_ID = "service_giasjvc";
const EMAILJS_TEMPLATE_ID = "template_57vum8m";
if(EMAILJS_PUBLIC_KEY){ emailjs.init(EMAILJS_PUBLIC_KEY); }

const L = {
  ta:{title:"🥚 ஆர்டர் படிவம்", sub:"Egg Order Form", l1:"பெயர்", l2:"தொடர்பு எண்", l3:"வாட்ஸ்அப் எண்",
    l4:"அளவு", l5:"தேதி", l6:"விலை (₹)", l7:"குறிப்பு", l8:"டெலிவரி முகவரி", l9:"அடுத்த முறை எனக்காக இதை சேமிக்கவும்",
    submit:"சமர்ப்பிக்கவும்",
    sTitle:"ஆர்டர் சமர்ப்பிக்கப்பட்டது!", sSub:"விரைவில் தொடர்பு கொள்வோம். நன்றி!", wa:"💬 வாட்ஸ்அப்பில் பகிரவும்",
    payLabel:"UPI மூலம் ₹", payLabel2:" செலுத்தவும்", payNow:"📱 இப்போது செலுத்தவும்",
    needName:"பெயரை உள்ளிடவும்", minQtyHint:(n)=>`குறைந்தபட்சம் ${n} முட்டைகள்`,
    minQtyError:(n)=>`குறைந்தபட்சம் ${n} முட்டைகள் ஆர்டர் செய்யவும்`,
    customRateNote:(r)=>`✓ உங்களுக்கான சிறப்பு விலை: ₹${r}/முட்டை`},
  en:{title:"🥚 Order Form", sub:"Egg Order Form", l1:"Name", l2:"Contact Number", l3:"WhatsApp Number",
    l4:"Quantity", l5:"Date", l6:"Price (₹)", l7:"Note", l8:"Delivery Address", l9:"Save my details for next time",
    submit:"Submit",
    sTitle:"Order Submitted!", sSub:"We'll contact you shortly. Thank you!", wa:"💬 Share on WhatsApp",
    payLabel:"Pay ₹", payLabel2:" via UPI", payNow:"📱 Pay Now",
    needName:"Please enter your name", minQtyHint:(n)=>`Minimum ${n} eggs`,
    minQtyError:(n)=>`Please order at least ${n} eggs`,
    customRateNote:(r)=>`✓ Your special rate: ₹${r}/egg`}
};
let lang = localStorage.getItem('egg_order_lang') || 'ta';
function applyLang(){
  const t = L[lang];
  hTitle.textContent=t.title; hSub.textContent=t.sub;
  l1.textContent=t.l1; l2.textContent=t.l2; l3.textContent=t.l3; l4.textContent=t.l4;
  l5.textContent=t.l5; l6.textContent=t.l6; l7.textContent=t.l7; l8.textContent=t.l8; l9.textContent=t.l9;
  submitBtn.textContent=t.submit; sTitle.textContent=t.sTitle; sSub.textContent=t.sSub;
  waShareBtn.textContent=t.wa; payNowBtn.textContent=t.payNow;
  document.getElementById('payLabelPrefix').textContent = t.payLabel;
  document.getElementById('payLabelSuffix').textContent = t.payLabel2;
  langBtn.textContent = lang==='ta' ? 'English':'தமிழ்';
  minQtyHint.textContent = t.minQtyHint(minOrderQty);
  updateCustomRateNote();
}
function toggleLang(){ lang = lang==='ta'?'en':'ta'; localStorage.setItem('egg_order_lang',lang); applyLang(); }
f_date.value = new Date().toISOString().split('T')[0];

let sellingRate = 0;
let minOrderQty = 1;
let isCustomRate = false;
const urlParams = new URLSearchParams(location.search);
const customerKey = (urlParams.get('c')||'').replace(/\D/g,'');

Promise.all([
  db.ref('settings/saleRate').once('value'),
  customerKey ? db.ref('customerMaster/'+customerKey+'/rate').once('value') : Promise.resolve(null),
  customerKey ? db.ref('customerRates/'+customerKey).once('value') : Promise.resolve(null)
]).then(([generalSnap, masterSnap, legacySnap])=>{
  const generalRate = generalSnap.exists() ? Number(generalSnap.val()) : 0;
  const masterRate = (masterSnap && masterSnap.exists()) ? Number(masterSnap.val()) : null;
  const legacyRate = (legacySnap && legacySnap.exists()) ? Number(legacySnap.val()) : null;
  const customRate = (masterRate!=null && masterRate>0) ? masterRate : legacyRate;
  if(customRate!=null && customRate>0){
    sellingRate = customRate;
    isCustomRate = true;
  } else {
    sellingRate = generalRate;
    isCustomRate = false;
  }
  recalcPrice();
  updateCustomRateNote();
});
db.ref('settings/minOrderQty').once('value').then(snap=>{
  minOrderQty = snap.exists() ? Number(snap.val()) : 1;
  minQtyHint.textContent = L[lang].minQtyHint(minOrderQty);
});
function updateCustomRateNote(){
  const el = document.getElementById('customRateNote');
  if(!el) return;
  if(isCustomRate){
    el.style.display='block';
    el.textContent = L[lang].customRateNote(sellingRate);
  } else {
    el.style.display='none';
  }
}

// Load saved customer details if present
const savedDetails = localStorage.getItem('egg_customer_details');
if(savedDetails){
  try{
    const d = JSON.parse(savedDetails);
    f_name.value = d.name||''; f_contact.value = d.contact||'';
    f_whatsapp.value = d.whatsapp||''; f_address.value = d.address||'';
    f_savedetails.checked = true;
  }catch(e){}
}
applyLang();

function recalcPrice(){
  const qty = Number(f_qty.value||0);
  f_price.value = (qty * sellingRate).toFixed(2);
}

let lastOrder = null;
const UPI_ID = "9994869502@kotak";
function submitOrder(){
  const name = f_name.value.trim();
  if(!name){ alert(L[lang].needName); return; }
  const qty = Number(f_qty.value||0);
  if(qty < minOrderQty){ alert(L[lang].minQtyError(minOrderQty)); return; }
  const data = {
    name, contact:f_contact.value.trim(), whatsapp:f_whatsapp.value.trim(),
    address:f_address.value.trim(),
    qty, date:f_date.value, price:Number(f_price.value||0), rate:sellingRate, customRate:isCustomRate,
    note:f_note.value.trim(), status:'new', createdAt: Date.now()
  };
  if(f_savedetails.checked){
    localStorage.setItem('egg_customer_details', JSON.stringify({
      name:data.name, contact:data.contact, whatsapp:data.whatsapp, address:data.address
    }));
  } else {
    localStorage.removeItem('egg_customer_details');
  }
  db.ref('orders').push(data).then(()=>{
    lastOrder = data;
    formCard.style.display='none';
    successCard.style.display='block';
    if(data.price > 0){
      const upiLink = `upi://pay?pa=${encodeURIComponent(UPI_ID)}&pn=${encodeURIComponent('Egg Trading')}&am=${data.price}&cu=INR&tn=${encodeURIComponent('Order-'+data.name)}`;
      payAmount.textContent = data.price;
      payQR.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(upiLink)}`;
      payNowBtn.href = upiLink;
      payBox.style.display = 'block';
    } else {
      payBox.style.display = 'none';
    }
    if(EMAILJS_PUBLIC_KEY && EMAILJS_SERVICE_ID && EMAILJS_TEMPLATE_ID){
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email:"ramesh@sramesh.in", customer_name:data.name, contact:data.contact,
        qty:data.qty, price:data.price, date:data.date, note:data.note, address:data.address
      }).then(()=>{ console.log('Email sent OK'); }).catch((err)=>{ alert('Email error: '+JSON.stringify(err)); });
    }
  });
}
function shareWA(){
  if(!lastOrder) return;
  const d = lastOrder.date.split('-').reverse().join('-'); // YYYY-MM-DD -> DD-MM-YYYY
  const msg = lang==='ta'
    ? `🔔 புதிய ஆர்டர் வந்துள்ளது\n\n👤 பெயர்     : ${lastOrder.name}\n🥚 பொருள்    : முட்டைகள்\n📦 எண்ணிக்கை : ${lastOrder.qty}\n💰 மொத்தம்   : ₹${lastOrder.price}\n📅 தேதி      : ${d}\n\n✅ உடனடியாக செயல்படுத்தவும்.`
    : `🔔 New Order Received\n\n👤 Name     : ${lastOrder.name}\n🥚 Item     : Eggs\n📦 Quantity : ${lastOrder.qty}\n💰 Total    : ₹${lastOrder.price}\n📅 Date      : ${d}\n\n✅ Please process immediately.`;
  window.open(`https://wa.me/919994869502?text=${encodeURIComponent(msg)}`,'_blank');
}
</script>
</body>
</html>
